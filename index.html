<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NetLearn — Networking & CCNA Study</title>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- PWA: installable, offline-capable -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0c1018" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <!-- iOS add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NetLearn" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/home" data-nav>📡 <span>NetLearn</span></a>
    <nav class="topnav">
      <a href="#/home" data-nav>Home</a>
      <a href="#/exam" data-nav>Exam</a>
      <a href="#/games" data-nav>Games</a>
      <a href="#/test" data-nav>Test</a>
      <a href="#/badges" data-nav>Badges</a>
      <a href="#/sync" data-nav>Sync</a>
    </nav>
  </header>

  <div id="scorebar" class="scorebar"></div>

  <main id="view" class="view"></main>

  <footer class="footer">
    <span class="muted">NetLearn · built from Avigilon / CCTV networking concepts · progress saved in this browser</span>
  </footer>

  <div id="toast-host" class="toast-host"></div>

  <!-- order matters: data → expansion → content layer → store → helpers → router → features → app -->
  <script src="js/data/concepts.js"></script>
  <script src="js/data/more-questions.js"></script>
  <!-- topic expansions (each appends onto an existing concept in window.CONCEPTS) -->
  <script src="js/data/expand/cctv.js"></script>
  <script src="js/data/expand/dhcp-dns.js"></script>
  <script src="js/data/expand/firewall.js"></script>
  <script src="js/data/expand/multicast.js"></script>
  <script src="js/data/expand/poe.js"></script>
  <script src="js/data/expand/storage.js"></script>
  <script src="js/data/expand/subnetting.js"></script>
  <script src="js/data/expand/vlan.js"></script>
  <script src="js/data/expand/vlan-setup.js"></script>
  <script src="js/data/expand/firewall-lab.js"></script>
  <!-- CCNA 200-301 exam topics (each pushes onto window.CONCEPTS) -->
  <script src="js/data/ccna/ccna-osi.js"></script>
  <script src="js/data/ccna/ccna-ipv4.js"></script>
  <script src="js/data/ccna/ccna-ipv6.js"></script>
  <script src="js/data/ccna/ccna-switching.js"></script>
  <script src="js/data/ccna/ccna-routing.js"></script>
  <script src="js/data/ccna/ccna-ipservices.js"></script>
  <script src="js/data/ccna/ccna-security.js"></script>
  <script src="js/data/ccna/ccna-wireless.js"></script>
  <script src="js/data/ccna/ccna-automation.js"></script>
  <!-- CCNA expansion packs: extra exam-realistic flashcards + quiz, concat onto each topic -->
  <script src="js/data/ccna/expand/ccna-osi.js"></script>
  <script src="js/data/ccna/expand/ccna-ipv4.js"></script>
  <script src="js/data/ccna/expand/ccna-ipv6.js"></script>
  <script src="js/data/ccna/expand/ccna-switching.js"></script>
  <script src="js/data/ccna/expand/ccna-routing.js"></script>
  <script src="js/data/ccna/expand/ccna-ipservices.js"></script>
  <script src="js/data/ccna/expand/ccna-security.js"></script>
  <script src="js/data/ccna/expand/ccna-wireless.js"></script>
  <script src="js/data/ccna/expand/ccna-automation.js"></script>
  <script src="js/data/content.js"></script>
  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/features/flashcards.js"></script>
  <script src="js/features/diagrams.js"></script>
  <script src="js/features/quiz.js"></script>
  <script src="js/features/games.js"></script>
  <script src="js/features/test.js"></script>
  <script src="js/features/exam.js"></script>
  <script src="js/features/sync.js"></script>
  <script src="js/app.js"></script>

  <!-- register the service worker for offline use (relative path → subpath-safe) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
